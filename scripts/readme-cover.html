<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=2880, initial-scale=1" />
    <title>Sindie README cover</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f4f3ef;
        --ink: #111111;
        --rule: #c5c4bd;
        --accent: #1746a2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 2880px;
        height: 1120px;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
      }

      body {
        color: var(--ink);
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: 2880px;
        height: 1120px;
        padding: 52px 72px 58px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 40px;
      }

      article {
        min-width: 0;
      }

      .artwork-field {
        display: flex;
        height: 700px;
        align-items: flex-end;
        justify-content: center;
        padding: 0 8px 22px;
        border-bottom: 1px solid var(--rule);
      }

      .artwork-field img {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 678px;
        border: 2px solid var(--ink);
        object-fit: contain;
      }

      .score {
        margin-top: 30px;
        font-family: "Arial Narrow", Arial, sans-serif;
        font-size: 112px;
        font-stretch: condensed;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        letter-spacing: -0.055em;
        line-height: 0.8;
      }

      .denominator {
        margin-left: 8px;
        color: var(--accent);
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .reason {
        max-width: 500px;
        margin: 28px 0 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 31px;
        font-weight: 400;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="gallery" aria-label="Five Sindie design evaluations">
        <article>
          <div class="artwork-field">
            <img
              src="../evals/cases/grida/punk-poster/artifact.webp"
              alt="Orange duotone punk gig poster"
            />
          </div>
          <div class="score">92<span class="denominator">/100</span></div>
          <p class="reason">Controlled noise; hierarchy survives.</p>
        </article>

        <article>
          <div class="artwork-field">
            <img
              src="../evals/cases/grida/coffee-poster/artifact.webp"
              alt="Blue Coffee advertising poster"
            />
          </div>
          <div class="score">83<span class="denominator">/100</span></div>
          <p class="reason">Coherent campaign; flavor copy recedes.</p>
        </article>

        <article>
          <div class="artwork-field">
            <img
              src="../evals/cases/grida/kinetic-mobile/artifact.webp"
              alt="Minimal kinetic mobile sculpture"
            />
          </div>
          <div class="score">83<span class="denominator">/100</span></div>
          <p class="reason">Balanced tension; support feels fragile.</p>
        </article>

        <article>
          <div class="artwork-field">
            <img
              src="../evals/cases/grida/icon-grid/artifact.webp"
              alt="Colorful music and food icon system"
            />
          </div>
          <div class="score">75<span class="denominator">/100</span></div>
          <p class="reason">Strong family; meaning is uneven.</p>
        </article>

        <article>
          <div class="artwork-field">
            <img
              src="../.runs/fixtures/negative-control/night-market-poster/artifact.png"
              alt="Crowded Riverside Night Market poster"
            />
          </div>
          <div class="score">42<span class="denominator">/100</span></div>
          <p class="reason">Details scatter; time and venue lose contrast.</p>
        </article>
      </section>
    </main>
  </body>
</html>
